name: Tests

on:
  workflow_call:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pyflakes

      - name: Check syntax errors
        run: pyflakes app/ main.py

      - name: Lint with ruff
        run: ruff check app/ main.py

      - name: Check formatting with ruff
        run: ruff format --check app/ main.py
