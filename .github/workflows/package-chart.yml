name: Package Helm Chart

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Extract Chart Versions
        id: chart_info
        run: |
          V1_VERSION=$(grep '^version:' chart/Chart.yaml | awk '{print $2}' | tr -d '"')
          V1_NAME=$(grep '^name:' chart/Chart.yaml | awk '{print $2}' | tr -d '"')
          V2_VERSION=$(grep '^version:' chart-v2/Chart.yaml | awk '{print $2}' | tr -d '"')
          V2_NAME=$(grep '^name:' chart-v2/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "v1_version=${V1_VERSION}" >> $GITHUB_OUTPUT
          echo "v1_name=${V1_NAME}" >> $GITHUB_OUTPUT
          echo "v2_version=${V2_VERSION}" >> $GITHUB_OUTPUT
          echo "v2_name=${V2_NAME}" >> $GITHUB_OUTPUT

      - name: Package Charts
        run: |
          helm package chart -d .
          helm package chart-v2 -d .

      - name: Release V1 Chart
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.chart_info.outputs.v1_version }}
          files: |
            ${{ steps.chart_info.outputs.v1_name }}-${{ steps.chart_info.outputs.v1_version }}.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release V2 Chart
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2-${{ steps.chart_info.outputs.v2_version }}
          files: |
            ${{ steps.chart_info.outputs.v2_name }}-${{ steps.chart_info.outputs.v2_version }}.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
