---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chatterboxapi-config
  namespace: {{ .Release.Namespace }}
data:
  PORT: {{ .Values.service.port | quote }}
  HOST: "0.0.0.0"
  DEVICE: {{ .Values.tts.device | quote }}
  MAX_TOTAL_LENGTH: {{ .Values.tts.maxTotalLength | quote }}
  MAX_CHUNK_LENGTH: {{ .Values.tts.maxChunkLength | quote }}
  EXAGGERATION: {{ .Values.tts.exaggeration | quote }}
  CFG_WEIGHT: {{ .Values.tts.cfgWeight | quote }}
  TEMPERATURE: {{ .Values.tts.temperature | quote }}
  USE_MULTILINGUAL_MODEL: {{ .Values.tts.useMultilingualModel | quote }}
  MODEL_CACHE_DIR: /data/huggingface
  VOICE_LIBRARY_DIR: /data/reference-voices
  LONG_TEXT_DATA_DIR: /data/long_text_jobs
  HF_HOME: /data/huggingface
  HF_ENDPOINT: {{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE | default "https://huggingface.co/" | quote }}
  HF_TOKEN: {{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN | default "" | quote }}
  HUGGING_FACE_HUB_TOKEN: {{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN | default "" | quote }}
  HF_HUB_CACHE: /data/huggingface/hub
  TRANSFORMERS_CACHE: /data/huggingface/transformers
  TORCH_HOME: /data/torch
  NVIDIA_VISIBLE_DEVICES: {{ .Values.tts.nvidiaVisibleDevices | quote }}
  NVIDIA_DRIVER_CAPABILITIES: {{ .Values.tts.nvidiaDriverCapabilities | quote }}
