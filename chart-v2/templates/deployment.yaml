---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: chatterboxtts-v2
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chatterboxtts-v2
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chatterboxtts-v2
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: chatterboxtts-v2
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
          ports:
            - name: api
              containerPort: {{ .Values.service.backendPort }}
              protocol: TCP
          resources:
            requests:
              cpu: "4"
              memory: 12Gi
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "12288"
            limits:
              cpu: "4"
              memory: 12Gi
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "12288"
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: huggingface
              mountPath: /data/huggingface
            - name: torch
              mountPath: /data/torch
            - name: reference-voices
              mountPath: /data/reference-voices
            - name: long-text-jobs
              mountPath: /data/long_text_jobs
          securityContext:
            allowPrivilegeEscalation: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /frontend-health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /frontend-health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: "100m"
              memory: 64Mi
            limits:
              cpu: "500m"
              memory: 128Mi
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
      volumes:
        - name: nginx-config
          configMap:
            name: {{ .Release.Name }}-nginx-config
        - name: huggingface
          hostPath:
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: "{{ .Values.userspace.appData }}/huggingface"
              {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/huggingface"
              {{- end }}
            {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/huggingface"
            {{- end }}
            type: DirectoryOrCreate
        - name: torch
          hostPath:
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: "{{ .Values.userspace.appData }}/torch"
              {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/torch"
              {{- end }}
            {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/torch"
            {{- end }}
            type: DirectoryOrCreate
        - name: reference-voices
          hostPath:
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: "{{ .Values.userspace.appData }}/reference-voices"
              {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/reference-voices"
              {{- end }}
            {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/reference-voices"
            {{- end }}
            type: DirectoryOrCreate
        - name: long-text-jobs
          hostPath:
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: "{{ .Values.userspace.appData }}/long-text-jobs"
              {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/long-text-jobs"
              {{- end }}
            {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/long-text-jobs"
            {{- end }}
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: chatterboxtts-v2
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
    - name: api
      protocol: TCP
      port: {{ .Values.service.backendPort }}
      targetPort: api
