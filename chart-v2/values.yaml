image:
  repository: ghcr.io/progress44/chatterbox-tts-api
  tag: v2-blackwell
  pullPolicy: Always

frontend:
  image:
    repository: ghcr.io/progress44/chatterbox-frontend
    tag: latest
    pullPolicy: Always
  port: 80

service:
  port: 80
  backendPort: 4123

tts:
  device: cuda
  maxTotalLength: "4000"
  maxChunkLength: "280"
  exaggeration: "0.5"
  cfgWeight: "0.5"
  temperature: "0.8"
  useMultilingualModel: "true"
  nvidiaVisibleDevices: all
  nvidiaDriverCapabilities: compute,utility
